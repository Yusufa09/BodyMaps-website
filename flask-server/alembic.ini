# The DB URL is intentionally NOT set here — env.py reads it from
# Constants.DATABASE_URL. Don't hardcode a URL; it would override the env.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS-native path separators when rendering new migration filenames.
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
